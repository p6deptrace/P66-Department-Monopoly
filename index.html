<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pier Sixty-Six Department Race</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="header-row no-controls-header">
      <div>
        <div class="eyebrow">CSV Scoreboard Version</div>
        <h1>Pier Sixty-Six Department Race</h1>
        <p class="subtitle">Scores are loaded globally from scores.csv. Board pieces snap to the last completed 5-point tile. Spire pieces snap to the last completed 2-point rung.</p>
      </div>
    </section>

    <section id="board" class="board-grid" aria-label="Department race board"></section>

    <section class="rankings-card">
      <div class="rankings-header">
        <div>
          <h2>Department Rankings</h2>
          <p>Live leaderboard sorted by the latest uploaded scores.csv file.</p>
        </div>
        <div id="departmentCount" class="department-count"></div>
      </div>
      <div id="rankings" class="rankings-grid"></div>
    </section>
  </main>

  <script src="script.js"/script>
</body>
</html>
