<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pier Sixty-Six Department Race</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="header-row">
      <div>
        <div class="eyebrow">Static JavaScript Version</div>
        <h1>Pier Sixty-Six Department Race</h1>
        <p class="subtitle">Type any exact score from 0 to 110. Board pieces snap to the last completed 5-point tile. Spire pieces snap to the last completed 2-point rung.</p>
      </div>

      <div class="control-card" aria-label="Department score controls">
        <select id="departmentSelect" class="control-select"></select>
        <input id="scoreInput" class="control-input" type="number" min="0" max="110" step="1" value="0" placeholder="Points" />
        <span class="pts-label">pts</span>
        <button id="moveButton" class="primary-button">Move Piece</button>
        <button id="resetButton" class="reset-button">Reset All to 0</button>
      </div>
    </section>

    <section id="board" class="board-grid" aria-label="Department race board"></section>

    <section class="rankings-card">
      <div class="rankings-header">
        <div>
          <h2>Department Rankings</h2>
          <p>Live leaderboard sorted by actual points.</p>
        </div>
        <div id="departmentCount" class="department-count"></div>
      </div>
      <div id="rankings" class="rankings-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
